<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366f1" />
            <stop offset="50%" stop-color="#a855f7" />
            <stop offset="100%" stop-color="#ec4899" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <rect width="512" height="512" fill="transparent" />
    
    <path d="M256,48 C141.1,48 48,141.1 48,256 C48,370.9 141.1,464 256,464 C370.9,464 464,370.9 464,256 C464,141.1 370.9,48 256,48 Z" fill="none" stroke="url(#brandGrad)" stroke-width="32" />
    
    <!-- Film Strip Highlights -->
    <rect x="80" y="224" width="352" height="64" fill="url(#brandGrad)" opacity="0.1" />
    <path d="M128,80 L128,432 M384,80 L384,432" stroke="url(#brandGrad)" stroke-width="12" stroke-dasharray="24 24" />
    
    <!-- Growth Chart -->
    <path d="M140,340 L220,240 L300,280 L380,160" fill="none" stroke="#fff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    
    <polygon points="350,160 400,140 380,190" fill="#fff" filter="url(#glow)"/>
</svg>
